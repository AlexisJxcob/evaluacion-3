<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería — Artística San Sebastián</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles-js.css">
</head>
<body>

<!-- NAV BAR-->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Artística San Sebastián</a>
      <button class="navbar-toggler sin-radio" type="button"
              data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Inicio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link activo" href="galeria.html">Galería</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="contacto.html">Contacto</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

<!-- PAGE HEADER -->
  <header class="page-header">
    <div class="container">
      <span class="page-header-label fade-in">Colección 2024–2026</span>
      <h1 class="titulo-principal fade-in fade-in-delay-1">Galería</h1>
      <div class="divisor-oro divisor-centrado fade-in fade-in-delay-2"></div>
      <p class="fade-in fade-in-delay-2" style="max-width: 520px; margin: 0 auto;">
        Una selección curada de obras que exploran los límites entre lo efímero
        y lo permanente en el arte contemporáneo.
      </p>
    </div>
  </header>

<!-- GALERIA -->
<main class="container py-5">

  <div class="galeria-grid" id="galeria-grid">
    <!-- vacío a propósito, galeria.js lo llena -->
  </div>

</main>

<!-- MODAL DE DETALLE DE OBRA -->
<div id="modal-obra" class="oculto"> <!-- el modal comienza oculto por defecto -->
  <div class="modal-caja">

    <button id="btn-cerrar-modal" class="modal-btn-cerrar">✕</button>

    <img id="modal-imagen" src="" alt="" />
    <h2 id="modal-titulo"></h2>
    <p><strong>Técnica:</strong> <span id="modal-tecnica"></span></p>
    <p><strong>Año:</strong> <span id="modal-anio"></span></p>
    <p id="modal-descripcion"></p>

  </div>
</div>

  <!-- FOOTER -->
  <footer class="footer-personalizado">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6 mb-3 mb-md-0">
          <span class="footer-brand">Artística San Sebastián</span>
        </div>
        <div class="col-md-6 text-md-end">
          <p class="footer-texto">
            © 2026 Taller de Tecnologías Web &nbsp;|&nbsp; IF101IINF
          </p>
        </div>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/./js/galeria.js"></script>

</html>
